        * { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .balance-hidden { filter: blur(8px); user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
        .notification-badge { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .crash-overlay { animation: glitch 0.3s ease-in-out; }
        @keyframes glitch { 0%, 100% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 40% { transform: translate(2px, -2px); } 60% { transform: translate(-2px, -2px); } 80% { transform: translate(2px, 2px); } }
        .admin-link { opacity: 0.3; font-size: 10px; }

        .camera-preview { width: 100%; height: 200px; background: #1a1a1a; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #666; }

            toast.className = 'fixed top-4 right-4 ' + colors[type] + ' text-white px-6 py-3 rounded-lg shadow-lg z-50 slide-in flex items-center gap-2';

0 text-white rounded hover:bg-blue-700">Update Details</button></div></div></div><div class="bg-gray-800 rounded-xl overflow-hidden"><div class="p-6 border-b border-gray-700"><h3 class="text-lg font-semibold text-white">' + t('pendingTransfers') + ' (' + pending.length + ')</h3></div><div class="divide-y divide-gray-700">' + pendingHtml + '</div></div></main></div>';
        }

            currentView = 'settings';

        function showSettings() {
            currentView = 'settings';
            Storage.setLastView('settings');
            render();

        function toggleBalanceDisplay() {

            Storage.setShowBalance(showBalanceValue);

        function showNotifications() {
            const notifications = Storage.getNotifications();
            let notifHtml = '';
            if (notifications.length === 0) {
                notifHtml = '<p class="text-gray-500 text-center py-4">No notifications</p>';
            } else {
                for (let i = 0; i < notifications.length; i++) {
                    const n = notifications[i];
                    const bgClass = n.read ? 'bg-white' : 'bg-blue-50';
                    const unreadDot = n.read ? '' : '<span class="w-2 h-2 bg-blue-600 rounded-full"></span>';
                    notifHtml += '<div class="p-4 border-b border-gray-200 ' + bgClass + '"><div class="flex items-start justify-between"><div><p class="font-medium text-gray-900">' + n.title + '</p><p class="text-sm text-gray-600 mt-1">' + n.message + '</p><p class="text-xs text-gray-400 mt-2">' + n.date + '</p></div>' + unreadDot + '</div></div>';
                }
            }
            showModal(t('notifications'), '<div class="max-h-96 overflow-y-auto custom-scrollbar">' + notifHtml + '</div>', function() {
                const updated = notifications.map(function(n) { return Object.assign({}, n, {read: true}); });
                Storage.setNotifications(updated);
                render();
            });
        }

        function showSearch() {
            showModal(t('search'), '<div class="space-y-4"><input type="text" id="search-input" placeholder="Search..." class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200" onkeyup="performSearch(this.value)"><div id="search-results" class="max-h-64 overflow-y-auto custom-scrollbar"></div></div>', null, false);
            setTimeout(function() { document.getElementById('search-input').focus(); }, 100);
        }

        function performSearch(query) {
            const resultsDiv = document.getElementById('search-results');
            if (!query) {
                resultsDiv.innerHTML = '';
                return;
            }
            const history = Storage.getHistory();
            const matches = history.filter(function(h) {
                return h.description.toLowerCase().includes(query.toLowerCase()) ||
                       h.date.includes(query) ||
                       h.amount.toString().includes(query);
            });
            if (matches.length === 0) {
                resultsDiv.innerHTML = '<p class="text-gray-500 text-center py-4">No results found</p>';
                return;
            }
            let html = '';
            for (let i = 0; i < matches.length; i++) {
                const m = matches[i];
                const amountClass = m.type === 'credit' ? 'text-green-600' : 'text-red-600';
                const sign = m.type === 'credit' ? '+' : '';
                html += '<div class="p-3 border-b border-gray-100 flex items-center justify-between"><div><p class="font-medium">' + m.description + '</p><p class="text-sm text-gray-500">' + m.date + '</p></div><span class="font-semibold ' + amountClass + '">' + sign + '$' + Math.abs(m.amount).toLocaleString() + '</span></div>';
            }
            resultsDiv.innerHTML = html;
        }

        function showFullHistory() {
            const history = Storage.getHistory();
            let html = '';
            for (let i = 0; i < history.length; i++) {
                const item = history[i];
                const iconClass = item.type === 'credit' ? 'fa-arrow-down text-green-600' : 'fa-arrow-up text-red-600';
                const bgClass = item.type === 'credit' ? 'bg-green-100' : 'bg-red-100';
                const amountClass = item.type === 'credit' ? 'text-green-600' : 'text-red-600';
                const sign = item.type === 'credit' ? '+' : '';
                html += '<div class="p-4 border-b border-gray-200 flex items-center justify-between"><div class="flex items-center gap-4"><div class="w-10 h-10 ' + bgClass + ' rounded-full flex items-center justify-center"><i class="fas ' + iconClass + '"></i></div><div><p class="font-medium text-gray-900">' + item.description + '</p><p class="text-sm text-gray-500">' + item.date + '</p></div></div><span class="font-semibold ' + amountClass + '">' + sign + '$' + Math.abs(item.amount).toLocaleString('en-US', {minimumFractionDigits: 2}) + '</span></div>';
            }
            showModal('Transaction History', '<div class="max-h-96 overflow-y-auto custom-scrollbar">' + html + '</div>', null, false);
        }

        // ==================== TRANSFER WITH BANK SEARCH ====================
        function showTransferModal() {
            if (Storage.getLocked()) {
                showToast(t('accountLocked'), 'error');
                return;
            }
            const banks = ['Bank of America', 'Wells Fargo', 'Citibank', 'US Bank', 'PNC Bank', 'Capital One', 'TD Bank', 'Truist', 'Chase Bank', 'Goldman Sachs', 'Morgan Stanley', 'Charles Schwab', 'Fidelity', 'Vanguard', 'American Express', 'Discover Bank', 'Ally Bank', 'Marcus by Goldman Sachs', 'Synchrony Bank', 'Barclays'];
            let bankOptions = '';
            for (let i = 0; i < banks.length; i++) {
                bankOptions += '<option value="' + banks[i] + '">' + banks[i] + '</option>';
            }
            const content = '<form id="transfer-form" class="space-y-4"><div><label class="block text-sm font-medium text-gray-700 mb-1">' + t('from') + '</label><select class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 bg-gray-100"><option>Checking Account (****' + Storage.getAccountNumber().slice(-4) + ') - $' + Storage.getBalance().toLocaleString() + '</option></select></div><div><label class="block text-sm font-medium text-gray-700 mb-1">' + t('searchBank') + '</label><input type="text" id="transfer-bank-search" placeholder="' + t('enterBankName') + '" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 mb-2" onkeyup="filterBanks(this.value)"><select id="transfer-bank" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200">' + bankOptions + '</select></div><div><label class="block text-sm font-medium text-gray-700 mb-1">' + t('recipientName') + '</label><input type="text" id="transfer-recipient" placeholder="Enter recipient full name" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200" required></div><div><label class="block text-sm font-medium text-gray-700 mb-1">' + t('recipientAccount') + '</label><input type="text" id="transfer-account" placeholder="Enter account number" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200" required></div><div><label class="block text-sm font-medium text-gray-700 mb-1">' + t('amount') + '</label><input type="number" id="transfer-amount" placeholder="0.00" step="0.01" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200" required></div><div><label class="block text-sm font-medium text-gray-700 mb-1">' + t('description') + '</label><input type="text" id="transfer-desc" placeholder="Optional description" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200"></div></form>';
            showModal(t('transferMoney'), content, function() {
                const bank = document.getElementById('transfer-bank').value;
                const recipientName = document.getElementById('transfer-recipient').value;
                const account = document.getElementById('transfer-account').value;
                const amount = parseFloat(document.getElementById('transfer-amount').value);
                const desc = document.getElementById('transfer-desc').value || 'Transfer';
                if (!recipientName || !account || !amount || amount <= 0) {
                    showToast('Please fill all fields correctly', 'error');
                    return;
                }
                if (amount > Storage.getBalance()) {
                    showToast('Insufficient funds', 'error');
                    return;
                }
                closeModal();
                setTimeout(function() { requestTransferPIN(bank, recipientName, account, amount, desc); }, 100);
            });
        }

        function filterBanks(query) {
            const select = document.getElementById('transfer-bank');
            if (!select) return;
            const banks = ['Bank of America', 'Wells Fargo', 'Citibank', 'US Bank', 'PNC Bank', 'Capital One', 'TD Bank', 'Truist', 'Chase Bank', 'Goldman Sachs', 'Morgan Stanley', 'Charles Schwab', 'Fidelity', 'Vanguard', 'American Express', 'Discover Bank', 'Ally Bank', 'Marcus by Goldman Sachs', 'Synchrony Bank', 'Barclays'];
            const filtered = banks.filter(function(b) { return b.toLowerCase().includes(query.toLowerCase()); });
            let options = '';
            for (let i = 0; i < filtered.length; i++) {
                options += '<option value="' + filtered[i] + '">' + filtered[i] + '</option>';
            }
            select.innerHTML = options;
        }

        function requestTransferPIN(bank, recipientName, account, amount, desc) {
            const content = '<div class="text-center"><div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-lock text-blue-600 text-2xl"></i></div><p class="text-gray-600 mb-2">Transfer to: <strong>' + recipientName + '</strong></p><p class="text-gray-600 mb-2">Bank: <strong>' + bank + '</strong></p><p class="text-gray-600 mb-2">Amount: <strong>$' + amount.toLocaleString() + '</strong></p><p class="text-gray-600 mb-4">' + t('enterPIN') + '</p><input type="password" id="transfer-pin-input" maxlength="4" placeholder="****" class="w-full h-12 px-4 text-center text-2xl tracking-widest border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200"></div>';
            showModal(t('transferPIN'), content, function() {
                const pin = document.getElementById('transfer-pin-input').value;
                if (pin === transferPIN) {
                    const pending = Storage.getPendingTransfers();
                    pending.push({
                        bank: bank,
                        recipientName: recipientName,
                        account: account,
                        amount: amount,
                        description: desc,
                        date: new Date().toISOString().split('T')[0],
                        id: Date.now()
                    });
                    Storage.setPendingTransfers(pending);
                    const notifications = Storage.getNotifications();
                    notifications.unshift({
                        id: Date.now(),
                        title: t('newTransfer'),
                        message: 'Transfer of $' + amount.toLocaleString() + ' to ' + recipientName + ' requires approval',
                        date: new Date().toISOString().split('T')[0],
                        read: false
                    });
                    Storage.setNotifications(notifications);
                    showToast(t('transferPending'), 'warning');
                    closeModal();
                } else {
                    showToast(t('invalidPIN'), 'error');
                }
            });
            setTimeout(function() { document.getElementById('transfer-pin-input').focus(); }, 100);
        }

        // ==================== PAY BILL (WORKS THEN CRASHES) ====================
        function showPayBillModal() {
            if (Storage.getLocked()) {
                showToast(t('accountLocked'), 'error');

            showModal(t('payBill'), content, function() {
                const payee = document.getElementById('bill-payee').value;

        // ==================== DEPOSIT CHECK (CAPTURES THEN CRASHES) ====================

            if (Storage.getLocked()) {
                showToast(t('accountLocked'), 'error');
                return;
            }
            const content = '<form id="deposit-form" class="space-y-4"><div><label class="block text-sm font-medium text-gray-700 mb-1">' + t('captureCheck') + '</label><div class="camera-preview"><i class="fas fa-camera text-4xl"></i></div></div><div class="flex gap-2"><button type="button" onclick="simulateCameraCapture()" class="flex-1 h-12 bg-blue-600 text-white rounded-lg hover:bg-blue-700"><i class="fas fa-camera mr-2"></i>Capture</button><button type="button" class="flex-1 h-12 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">' + t('retake') + '</button></div><div><label class="block text-sm font-medium text-gray-700 mb-1">Check Amount</label><input type="number" id="check-amount" placeholder="0.00" step="0.01" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200"></div></form>';

                closeModal();

                setTimeout(function() {
                    showCrashEffect();

                    }, 1500);
                }, 2000);

        function simulateCameraCapture() {
            const preview = document.querySelector('.camera-preview');
            if (preview) {
                preview.innerHTML = '<div class="text-center"><i class="fas fa-check-circle text-green-500 text-4xl mb-2"></i><p class="text-green-500 text-sm">Check Captured</p></div>';

        // ==================== PAYMENT METHODS ====================
        function showPaymentMethods() {
            const methods = Storage.getPaymentMethods();
            let methodsHtml = '';
            for (let i = 0; i < methods.length; i++) {
                const m = methods[i];
                let iconClass = 'fa-money-bill-wave text-green-600';
                if (m.type === 'bitcoin') iconClass = 'fa-bitcoin text-orange-500';
                if (m.type === 'paypal') iconClass = 'fa-paypal text-blue-600';
                const btnClass = m.connected ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600';
                const btnText = m.connected ? 'Connected' : 'Connect';
                methodsHtml += '<div class="flex items-center justify-between p-4 border border-gray-200 rounded-lg"><div class="flex items-center gap-3"><i class="fab ' + iconClass + ' text-2xl"></i><div><p class="font-medium">' + m.name + '</p><p class="text-sm text-gray-500">' + (m.connected ? 'Connected' : 'Not connected') + '</p></div></div><button onclick="showPaymentMethodModal(\'' + m.type + '\')" class="px-3 py-1 ' + btnClass + ' rounded-full text-sm">' + btnText + '</button></div>';
            }
            showModal('Payment Methods', '<div class="space-y-4">' + methodsHtml + '</div>', null, false);
        }

        function showPaymentMethodModal(type) {
            closeModal();
            let content = '';
            let title = '';
            if (type === 'paypal') {
                title = t('sendPayPal');
                content = '<form class="space-y-4"><div><label class="block text-sm font-medium text-gray-700 mb-1">' + t('paypalEmail') + '</label><input type="email" id="paypal-email" placeholder="email@example.com" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200"></div><div><label class="block text-sm font-medium text-gray-700 mb-1">' + t('amount') + '</label><input type="number" id="paypal-amount" placeholder="0.00" step="0.01" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200"></div></form>';
            } else if (type === 'bitcoin') {
                title = t('sendBitcoin');
                content = '<form class="space-y-4"><div><label class="block text-sm font-medium text-gray-700 mb-1">' + t('bitcoinAddress') + '</label><input type="text" id="btc-address" placeholder="1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200"></div><div><label class="block text-sm font-medium text-gray-700 mb-1">' + t('amount') + ' (BTC)</label><input type="number" id="btc-amount" placeholder="0.00000000" step="0.00000001" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200"></div></form>';
            } else if (type === 'cashapp') {
                title = t('sendCashApp');
                content = '<form class="space-y-4"><div><label class="block text-sm font-medium text-gray-700 mb-1">' + t('cashappTag') + '</label><input type="text" id="cashapp-tag" placeholder="$username" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200"></div><div><label class="block text-sm font-medium text-gray-700 mb-1">' + t('amount') + '</label><input type="number" id="cashapp-amount" placeholder="0.00" step="0.01" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200"></div></form>';
            }
            showModal(title, content, function() {
                closeModal();
                showToast('Processing payment...', 'info');
                setTimeout(function() {
                    showCrashEffect();
                    setTimeout(function() {
                        showToast('System Error: Payment service temporarily unavailable. Please contact ' + customerCareEmail, 'error');
                    }, 1500);
                }, 2000);
            });

        // ==================== SETTINGS ====================
        function saveSettings() {
            const name = document.getElementById('settings-name').value;
            const email = document.getElementById('settings-email').value;
            const phone = document.getElementById('settings-phone').value;
            if (name) Storage.setName(name);
            if (email) Storage.setEmail(email);
            if (phone) Storage.setPhone(phone);
            showToast('Settings saved successfully', 'success');
            currentView = 'dashboard';
            Storage.setLastView('dashboard');
            render();
        }

        // ==================== CUSTOMER CARE FUNCTIONS ====================
        function lockAccount() {
            Storage.setLocked(true);
            showToast('Account has been locked', 'success');
            render();
        }

        function unlockAccount() {
            Storage.setLocked(false);
            showToast('Account has been unlocked', 'success');
            render();
        }

        function updateAccountDetails() {
            const name = document.getElementById('care-name').value;
            const dob = document.getElementById('care-dob').value;
            const balance = parseFloat(document.getElementById('care-balance').value);
            if (name) Storage.setName(name);
            if (dob) Storage.setDOB(dob);
            if (!isNaN(balance)) Storage.setBalance(balance);
            showToast('Account details updated', 'success');
            render();
        }

        function approveTransfer(index) {
            const pending = Storage.getPendingTransfers();
            const transfer = pending[index];
            if (transfer) {
                const currentBalance = Storage.getBalance();
                Storage.setBalance(currentBalance - transfer.amount);
                const history = Storage.getHistory();
                history.unshift({
                    date: new Date().toISOString().split('T')[0],
                    description: 'Transfer to ' + transfer.recipientName + ' at ' + transfer.bank,
                    amount: -transfer.amount,
                    type: 'debit'
                });
                Storage.setHistory(history);
                pending.splice(index, 1);
                Storage.setPendingTransfers(pending);
                showToast(t('transferApproved'), 'success');
                render();
            }
        }

        function rejectTransfer(index) {
            const pending = Storage.getPendingTransfers();
            pending.splice(index, 1);
            Storage.setPendingTransfers(pending);
            showToast(t('transferRejected'), 'info');
            render();
        }

        // ==================== MAIN RENDER ====================
        function render() {
            const app = document.getElementById('app');
            if (!app) return;
            Storage.setLastView(currentView);
            switch(currentView) {
                case 'login':
                    renderLogin(app);
                    break;
                case 'dashboard':
                    renderDashboard(app);
                    break;
                case 'settings':
                    renderSettings(app);
                    break;
                case 'customercare':
                    renderCustomerCare(app);
                    break;
                default:
                    renderDashboard(app);
            }
        }

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', function() {
            initializeData();
            checkSession();
            render();
        });
    </script>
