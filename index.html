        // ==================== TOAST NOTIFICATIONS ====================
        function showToast(message, type) {
            const toast = document.createElement('div');
            const colors = { success: 'bg-green-500', error: 'bg-red-500', warning: 'bg-yellow-500', info: 'bg-blue-500' };
            toast.className = 'fixed top-4 right-4 ' + colors[type] + ' text-white px-6 py-3 rounded-lg shadow-lg z-50 slide-in flex items-center gap-2';
            let icon = 'fa-info-circle';
            if (type === 'success') icon = 'fa-check-circle';
            if (type === 'error') icon = 'fa-exclamation-circle';
            toast.innerHTML = '<i class="fas ' + icon + '"></i><span>' + message + '</span>';
            document.body.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 4000);
        }

        // ==================== MODALS ====================
        function showModal(title, content, onConfirm, showCancel) {
            const modal = document.createElement('div');
            modal.id = 'active-modal';
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4';
            let cancelBtn = '';
            let confirmBtn = '';
            if (showCancel !== false) {
                cancelBtn = '<button onclick="closeModal()" class="px-4 py-2 text-gray-600 hover:text-gray-800">' + t('cancel') + '</button>';
            }
            if (onConfirm) {
                confirmBtn = '<button onclick="modalConfirm()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">' + t('confirm') + '</button>';
            }
            modal.innerHTML = '<div class="bg-white rounded-xl shadow-2xl max-w-md w-full fade-in"><div class="p-6 border-b border-gray-200"><h3 class="text-xl font-semibold text-gray-900">' + title + '</h3></div><div class="p-6">' + content + '</div><div class="p-6 border-t border-gray-200 flex gap-3 justify-end">' + cancelBtn + confirmBtn + '</div></div>';
            document.body.appendChild(modal);
            window.modalConfirm = function() { closeModal(); if (onConfirm) onConfirm(); };
        }

        function performSearch(query) {
            const resultsDiv = document.getElementById('search-results');
            if (!query) {
                resultsDiv.innerHTML = '';
                return;
            }
            const history = Storage.getHistory();
            const matches = history.filter(function(h) {
                return h.description.toLowerCase().includes(query.toLowerCase()) ||
                       h.date.includes(query) ||
                       h.amount.toString().includes(query);
            });
            if (matches.length === 0) {
                resultsDiv.innerHTML = '<p class="text-gray-500 text-center py-4">No results found</p>';
                return;
            }
            let html = '';
            for (let i = 0; i < matches.length; i++) {
                const m = matches[i];
                const amountClass = m.type === 'credit' ? 'text-green-600' : 'text-red-600';
                const sign = m.type === 'credit' ? '+' : '';
                html += '<div class="p-3 border-b border-gray-100 flex items-center justify-between"><div><p class="font-medium">' + m.description + '</p><p class="text-sm text-gray-500">' + m.date + '</p></div><span class="font-semibold ' + amountClass + '">' + sign + '$' + Math.abs(m.amount).toLocaleString() + '</span></div>';
            }
            resultsDiv.innerHTML = html;
        }

                const bgClass = item.type === 'credit' ? 'bg-green-100' : 'bg-red-100';
                const amountClass = item.type === 'credit' ? 'text-green-600' : 'text-red-600';
                const sign = item.type === 'credit' ? '+' : '';
                html += '<div class="p-4 border-b border-gray-200 flex items-center justify-between"><div class="flex items-center gap-4"><div class="w-10 h-10 ' + bgClass + ' rounded-full flex items-center justify-center"><i class="fas ' + iconClass + '"></i></div><div><p class="font-medium text-gray-900">' + item.description + '</p><p class="text-sm text-gray-500">' + item.date + '</p></div></div><span class="font-semibold ' + amountClass + '">' + sign + '$' + Math.abs(item.amount).toLocaleString('en-US', {minimumFractionDigits: 2}) + '</span></div>';
            }
            showModal('Transaction History', '<div class="max-h-96 overflow-y-auto custom-scrollbar">' + html + '</div>', null, false);
        }

        function showTransferModal() {
            if (Storage.getLocked()) {
                showToast(t('accountLocked'), 'error');
                return;
            }
            const banks = ['Bank of America', 'Wells Fargo', 'Citibank', 'US Bank', 'PNC Bank', 'Capital One', 'TD Bank', 'Truist'];
            let bankOptions = '';
            for (let i = 0; i < banks.length; i++) {
                bankOptions += '<option value="' + banks[i] + '">' + banks[i] + '</option>';
            }
            const content = '<form id="transfer-form" class="space-y-4"><div><label class="block text-sm font-medium text-gray-700 mb-1">' + t('from') + '</label><select class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200"><option>Checking Account (****' + Storage.getAccountNumber().slice(-4) + ')</option></select></div><div><label class="block text-sm font-medium text-gray-700 mb-1">' + t('to') + ' - Bank</label><select id="transfer-bank" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200">' + bankOptions + '</select></div><div><label class="block text-sm font-medium text-gray-700 mb-1">Account Number</label><input type="text" id="transfer-account" placeholder="Enter account number" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200" required></div><div><label class="block text-sm font-medium text-gray-700 mb-1">' + t('amount') + '</label><input type="number" id="transfer-amount" placeholder="0.00" step="0.01" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200" required></div><div><label class="block text-sm font-medium text-gray-700 mb-1">' + t('description') + '</label><input type="text" id="transfer-desc" placeholder="Optional description" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200"></div></form>';
            showModal(t('transferMoney'), content, function() {
                const bank = document.getElementById('transfer-bank').value;
                const account = document.getElementById('transfer-account').value;
                const amount = parseFloat(document.getElementById('transfer-amount').value);
                const desc = document.getElementById('transfer-desc').value || 'Transfer';
                if (!account || !amount || amount <= 0) {
                    showToast('Please fill all fields correctly', 'error');
                    return;
                }
                if (amount > Storage.getBalance()) {
                    showToast('Insufficient funds', 'error');
                    return;
                }
                closeModal();
                setTimeout(function() { requestTransferPIN(bank, account, amount, desc); }, 100);
            });
        }

        function requestTransferPIN(bank, account, amount, desc) {
            const content = '<div class="text-center"><div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-lock text-blue-600 text-2xl"></i></div><p class="text-gray-600 mb-4">' + t('enterPIN') + '</p><input type="password" id="transfer-pin-input" maxlength="4" placeholder="****" class="w-full h-12 px-4 text-center text-2xl tracking-widest border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200"></div>';
            showModal(t('transferPIN'), content, function() {
                const pin = document.getElementById('transfer-pin-input').value;
                if (pin === transferPIN) {
                    const pending = Storage.getPendingTransfers();
                    pending.push({
                        bank: bank,
                        account: account,
                        amount: amount,
                        description: desc,
                        date: new Date().toISOString().split('T')[0],
                        id: Date.now()
                    });
                    Storage.setPendingTransfers(pending);
                    const notifications = Storage.getNotifications();
                    notifications.unshift({
                        id: Date.now(),
                        title: t('newTransfer'),
                        message: t('transferRequiresApproval'),
                        date: new Date().toISOString().split('T')[0],
                        read: false
                    });
                    Storage.setNotifications(notifications);
                    showToast(t('transferPending'), 'warning');
                    closeModal();
                } else {
                    showToast(t('invalidPIN'), 'error');
                }
            });
            setTimeout(function() { document.getElementById('transfer-pin-input').focus(); }, 100);
        }

        function showPayBillModal() {
            if (Storage.getLocked()) {
                showToast(t('accountLocked'), 'error');
                return;
            }
            showToast(t('featureUnavailable'), 'warning');
        }

        function showDepositModal() {
            if (Storage.getLocked()) {
                showToast(t('accountLocked'), 'error');
                return;
            }
            showToast(t('featureUnavailable'), 'warning');
        }

        function showPaymentMethods() {
            const methods = Storage.getPaymentMethods();
            let methodsHtml = '';
            for (let i = 0; i < methods.length; i++) {
                const m = methods[i];
                let iconClass = 'fa-money-bill-wave text-green-600';
                if (m.type === 'bitcoin') iconClass = 'fa-bitcoin text-orange-500';
                if (m.type === 'paypal') iconClass = 'fa-paypal text-blue-600';
                const btnClass = m.connected ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600';
                const btnText = m.connected ? 'Connected' : 'Connect';
                methodsHtml += '<div class="flex items-center justify-between p-4 border border-gray-200 rounded-lg"><div class="flex items-center gap-3"><i class="fab ' + iconClass + ' text-2xl"></i><div><p class="font-medium">' + m.name + '</p><p class="text-sm text-gray-500">' + (m.connected ? 'Connected' : 'Not connected') + '</p></div></div><button onclick="togglePaymentMethod(' + m.id + ')" class="px-3 py-1 ' + btnClass + ' rounded-full text-sm">' + btnText + '</button></div>';
            }
            showModal('Payment Methods', '<div class="space-y-4">' + methodsHtml + '<div class="pt-4 border-t border-gray-200"><button onclick="showAddCardModal()" class="w-full h-12 bg-blue-600 text-white rounded-lg hover:bg-blue-700"><i class="fas fa-plus mr-2"></i>' + t('addCard') + '</button></div></div>', null, false);
        }

        function togglePaymentMethod(id) {
            const methods = Storage.getPaymentMethods();
            for (let i = 0; i < methods.length; i++) {
                if (methods[i].id === id) {
                    methods[i].connected = !methods[i].connected;
                    break;
                }
            }
            Storage.setPaymentMethods(methods);
            showPaymentMethods();
        }

        function showAddCardModal() {
            closeModal();
            const content = '<form class="space-y-4"><div><label class="block text-sm font-medium text-gray-700 mb-1">' + t('cardNumber') + '</label><input type="text" id="card-number" placeholder="0000 0000 0000 0000" maxlength="19" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200"></div><div class="grid grid-cols-2 gap-4"><div><label class="block text-sm font-medium text-gray-700 mb-1">' + t('expiryDate') + '</label><input type="text" id="card-expiry" placeholder="MM/YY" maxlength="5" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200"></div><div><label class="block text-sm font-medium text-gray-700 mb-1">' + t('cvv') + '</label><input type="password" id="card-cvv" placeholder="***" maxlength="3" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200"></div></div></form>';
            showModal(t('addCard'), content, function() {
                showToast(t('cardAdded'), 'success');
                closeModal();
            });
        }

        function saveSettings() {
            const name = document.getElementById('settings-name').value;
            const email = document.getElementById('settings-email').value;
            const phone = document.getElementById('settings-phone').value;
            const address = document.getElementById('settings-address').value;
            if (name) Storage.setName(name);
            if (email) Storage.setEmail(email);
            if (phone) Storage.setPhone(phone);
            if (address) Storage.setAddress(address);
            showToast('Settings saved successfully', 'success');
            currentView = 'dashboard';
            Storage.setLastView('dashboard');
            render();
        }

        function lockAccount() {
            Storage.setLocked(true);
            showToast('Account has been locked', 'success');
            render();
        }

        function unlockAccount() {
            Storage.setLocked(false);
            showToast('Account has been unlocked', 'success');
            render();
        }

        function updateAccountDetails() {
            const name = document.getElementById('care-name').value;
            const dob = document.getElementById('care-dob').value;
            const balance = parseFloat(document.getElementById('care-balance').value);
            if (name) Storage.setName(name);
            if (dob) Storage.setDOB(dob);
            if (!isNaN(balance)) Storage.setBalance(balance);
            showToast('Account details updated', 'success');
            render();
        }

        function approveTransfer(index) {
            const pending = Storage.getPendingTransfers();
            const transfer = pending[index];
            if (transfer) {
                const currentBalance = Storage.getBalance();
                Storage.setBalance(currentBalance - transfer.amount);
                const history = Storage.getHistory();
                history.unshift({
                    date: new Date().toISOString().split('T')[0],
                    description: 'Transfer to ' + transfer.bank + ' (*' + transfer.account.slice(-4) + ')',
                    amount: -transfer.amount,
                    type: 'debit'
                });
                Storage.setHistory(history);
                pending.splice(index, 1);
                Storage.setPendingTransfers(pending);
                showToast(t('transferApproved'), 'success');
                render();
            }
        }

        function rejectTransfer(index) {
            const pending = Storage.getPendingTransfers();
            pending.splice(index, 1);
            Storage.setPendingTransfers(pending);
            showToast(t('transferRejected'), 'info');
            render();
        }

        // ==================== MAIN RENDER ====================
        function render() {
            const app = document.getElementById('app');
            if (!app) return;
            Storage.setLastView(currentView);
            switch(currentView) {
                case 'login':
                    renderLogin(app);
                    break;
                case 'dashboard':
                    renderDashboard(app);
                    break;
                case 'settings':
                    renderSettings(app);
                    break;
                case 'customercare':
                    renderCustomerCare(app);
                    break;
                default:
                    renderDashboard(app);
            }
        }

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', function() {
            initializeData();
            checkSession();
            render();
        });
    </script>
</body>
</html>
