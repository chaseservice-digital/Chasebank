      animation: slideIn 0.3s ease-out; 
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 24px;
      border-radius: 8px;
      color: white;
      font-weight: 500;
      z-index: 9999;

    @keyframes slideIn { 
      from { transform: translateX(100%); opacity: 0; } 
      to { transform: translateX(0); opacity: 1; } 
    }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    function showToast(message, type = 'info') {
      const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-blue-600', warning: 'bg-amber-600' };
      const toast = document.createElement('div');
      toast.className = `toast ${colors[type] || colors.info}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // ============================================
    // APP STATE
    // ============================================
    let currentView = 'login';
    let sidebarOpen = false;
    let notificationsOpen = false;
    let searchQuery = '';

    // ============================================
    // CHECK SESSION ON LOAD - NEW FEATURE
    // ============================================
    function checkSession() {
      // If user is logged in and account is not locked, restore their session
      if (Storage.isLoggedIn()) {
        if (Storage.getLocked()) {
          currentView = 'login';
        } else {
          // Restore last view or default to dashboard
          currentView = Storage.getLastView();
        }
      } else {
        currentView = 'login';
      }
    }

    // ============================================
    // RENDER FUNCTIONS
    // ============================================
    function render() {
      const app = document.getElementById('app');
      
      // Save current view for session persistence
      if (currentView !== 'login' && currentView !== 'adminLogin') {
        Storage.setLastView(currentView);
      }
      
      if (Storage.getLocked() && currentView !== 'admin') {
        renderLockedScreen(app);
        return;
      }

      switch(currentView) {
        case 'login': renderLogin(app); break;
        case 'dashboard': renderDashboard(app); break;
        case 'settings': renderSettings(app); break;
        case 'transfer': renderTransfer(app); break;
        case 'paypal': renderPayPal(app); break;
        case 'bitcoin': renderBitcoin(app); break;
        case 'cashapp': renderCashApp(app); break;
        case 'addcard': renderAddCard(app); break;
        case 'admin': renderAdminPortal(app); break;
        case 'adminLogin': renderAdminLogin(app); break;
        case 'search': renderSearch(app); break;
        default: renderLogin(app);
      }
    }
